server.port=8080

# Ollama configuration
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.timeout-seconds=180

# Recommended models (pull with: ollama pull <model>)
# ollama.model=llama3        # Best quality
# ollama.model=mistral       # Fast + good structured output
# ollama.model=codellama     # Strong at code generation
# ollama.model=gemma2        # Lightweight, good quality

# CORS - allow frontend served from same origin or dev server
spring.web.cors.allowed-origins=*
